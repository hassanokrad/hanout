<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0f766e" />
  <meta name="description" content="Hanout — a free, offline, modular manager for any small shop." />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Hanout" />
  <!--__HEAD__-->
  <title>Hanout</title>
  <style>/*__STYLES__*/</style>
</head>
<body data-theme="light">
  <header class="h-header">
    <div class="h-header-inner">
      <div class="h-brand">
        <span id="h-logo" class="h-logo" aria-hidden="true">ح</span>
        <div class="h-brand-text">
          <div id="h-business" class="h-business">Hanout</div>
          <div class="h-status"><span class="h-status-dot"></span><span id="h-status-txt"></span></div>
        </div>
      </div>
      <div class="h-header-actions">
        <button id="h-theme" class="h-icon-btn" type="button" aria-label="Toggle theme">🌙</button>
        <button id="h-settings" class="h-icon-btn" type="button" aria-label="Settings">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round"><path d="M5 8h9"/><circle cx="17.5" cy="8" r="2.3"/><path d="M19 16h-9"/><circle cx="6.5" cy="16" r="2.3"/></svg>
        </button>
      </div>
    </div>
  </header>

  <main id="h-view" class="h-view" role="main"></main>

  <nav id="h-nav" class="h-nav" aria-label="Sections"></nav>

  <noscript style="display:block;padding:2rem;text-align:center">Hanout needs JavaScript enabled.</noscript>

  <script>/*__CORE__*/</script>
  <script>/*__MODULES__*/</script>
  <script id="h-seed" type="application/json">/*__SEED__*/</script>
  <script>
    (function () {
      var SEED = null;
      try { SEED = JSON.parse(document.getElementById('h-seed').textContent); } catch (e) { /* no seed */ }
      function start() { window.Hanout.boot(SEED); }
      if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', start);
      else start();
    })();
  </script>
</body>
</html>
